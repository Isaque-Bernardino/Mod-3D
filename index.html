<html>
  <head>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <title> Terceira experiencia de realidade aumentada usando modelo AR.js do A - frame e o marcador Hiro. </title>
  </head>
  <body style = "margin 0px; overflow: hidden">
    <a-scene vr-mode-ui = "enabled: false" embedded arjs="debugUIEnable: false">
      <a-assets>
        <a-asset-item id="susy" src="susany.glb"></a-asset-item>
      </a-assets>
      <a-marker type="pattern" url="pattern-pantarma_Camada 1.patt">
        <a-entity id="3d-model" position="0 0 0" rotation="-90 0 0 " scale="0.5 0.5 0.5" gltf-model="#susy"></a-entity>
      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
